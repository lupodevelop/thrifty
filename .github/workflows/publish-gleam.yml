name: Publish (Gleam)

# Publish package using `gleam publish` when a tag matching v* is pushed.
# Steps:
# - checkout (full history)
# - setup OTP / Gleam
# - build & test
# - verify the tag version matches `gleam.toml`
# - verify HEX API key via HTTP
# - publish with `gleam publish --yes` (non-interactive)

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Release to Hex
    runs-on: ubuntu-latest
    if: >-
      contains(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup runtime
        uses: ./.github/actions/ci-setup
        with:
          otp-version: '28.1'
          gleam-version: '1.13.0'

      - name: Show versions
        run: |
          erl -version || true
          gleam --version || true

      - name: Cache Gleam deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/gleam
            ~/.gleam
            ./_gleam_deps
            ./build
          key: ${{ runner.os }}-gleam-1.13.0-otp28-publish-${{ hashFiles('**/gleam.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-1.13.0-otp28-publish-

      - name: Install dependencies
        run: |
          set -eux
          gleam deps download

      - name: Build
        run: |
          set -eux
          gleam build

      - name: Run tests (sanity)
        run: |
          set -eux
          gleam test

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          # If this run was triggered by a tag push, derive version from the tag.
          # If triggered by a merged PR (no tag yet), fall back to the version in gleam.toml.
          if echo "${GITHUB_REF}" | grep -q '^refs/tags/'; then
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
            echo "Determined version ${VERSION} from tag ${TAG}"
          else
            VERSION=$(grep '^version' gleam.toml | sed -E 's/.*= *"([^\"]+)".*/\1/') || true
            echo "GITHUB_REF=${GITHUB_REF}; using version from gleam.toml: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create tag from gleam.toml (on merged PR)
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          set -euo pipefail
          VERSION=$(grep '^version' gleam.toml | sed -E 's/.*= *"([^\"]+)".*/\1/')
          TAG="v${VERSION}"
          echo "Derived tag: ${TAG}"
          git fetch origin --tags
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Pushed tag ${TAG} to origin"

      - name: Verify tag matches `gleam.toml`
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          FILE_VER=$(grep '^version' gleam.toml | sed -E 's/.*= *"([^"]+)".*/\1/') || true
          echo "gleam.toml version: ${FILE_VER}"
          if [ -n "${FILE_VER}" ] && [ "${FILE_VER}" != "${VERSION}" ]; then
            echo "Tag version (${VERSION}) does not match gleam.toml (${FILE_VER}). Aborting publish."
            exit 1
          fi

      - name: Trust HEX API key presence (skip /api/me check)
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "HEX_API_KEY secret is not set; aborting"
            exit 1
          fi
          # Do not call the Hex API here (some environments return unexpected 404s).
          # Treat the presence of a non-empty secret as 'valid' for CI publishing.
          # Do not print the key or any masked preview in logs.
          # Only confirm that the secret is present to avoid accidental leaks.
          echo "HEX_API_KEY is set"

      - name: Check if version already published on Hex
        run: |
          set -euo pipefail
          PACKAGE=$(grep '^name' gleam.toml | sed -E 's/.*= *"([^"]+)".*/\1/')
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Checking Hex for package ${PACKAGE} version ${VERSION}"
          if curl -s "https://hex.pm/api/packages/${PACKAGE}" | jq -e ".releases[] | select(.version==\"${VERSION}\")" > /dev/null; then
            echo "Version ${VERSION} already exists on Hex. Skipping publish."
            exit 0
          fi

      - name: Diagnostics — repo and hex key status (non-sensitive)
        run: |
          set -euo pipefail
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-(unset)}"
          echo "git remote:"; git remote -v || true
          echo "gleam.toml repository field:"; grep '^repository' -n gleam.toml || true
          echo "Checking GitHub repo URL (no auth)"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://github.com/${GITHUB_REPOSITORY}") || true
          echo "GitHub URL HTTP status: ${HTTP_CODE}"
          echo "Checking hex key file presence"
          if [ -f "$HOME/.hex/hexpm_key" ]; then
            echo "hex key file: exists"
            if [ -r "$HOME/.hex/hexpm_key" ]; then
              echo "hex key file: readable"
            else
              echo "hex key file: not readable"
            fi
          else
            echo "hex key file: missing"
          fi
          if [ -n "${HEX_API_KEY:-}" ]; then
            echo "HEX_API_KEY env var: set"
          else
            echo "HEX_API_KEY env var: not set"
          fi

      - name: Publish to Hex
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          echo "Publishing with gleam publish --yes (non-interactive)"
          # Ensure the Hex API key is available to rebar3/gleam in non-interactive runners
          mkdir -p "$HOME/.hex"
          # Write the raw API key to the hex key file so the client won't prompt for credentials.
          printf "%s" "${HEX_API_KEY}" > "$HOME/.hex/hexpm_key"
          chmod 600 "$HOME/.hex/hexpm_key"
          # Perform publish (stdin remains connected so --yes can be provided)
          echo "I am not using semantic versioning" | gleam publish --yes

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body: |
            Release ${{ github.ref_name }}
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifact (audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gleam-hex-package
          path: _build/default/lib/thrifty/hex/thrifty-*.tar || true
