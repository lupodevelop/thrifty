name: Publish on tag

# Publish package to Hex only when a tag `v*` is pushed. Derive version from the
# tag, check Hex for an existing release, update `rebar.config`, authenticate
# with `HEX_API_KEY` and publish only when the version is not already present.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup runtime
        uses: ./.github/actions/ci-setup
        with:
          otp-version: '28.1'
          rebar3-version: '3.25.1'
          gleam-version: '1.13.0'

      - name: Show versions
        run: |
          erl -version || true
          gleam --version || true

      - name: Cache Gleam deps and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/gleam
            ~/.gleam
            ./_gleam_deps
            ./build
          key: ${{ runner.os }}-gleam-1.13.0-otp28-release-${{ hashFiles('**/gleam.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-1.13.0-otp28-release-

      - name: Install dependencies
        run: gleam deps download

      - name: Check formatting
        run: gleam format --check src test

      - name: Build
        run: gleam build

      - name: Run tests
        run: |
          gleam test

      - name: Build hex package
        run: rebar3 hex build

      - name: Ensure rebar3 plugins
        run: rebar3 plugins upgrade --all || true

      - name: Determine version from tag
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "Determined version ${VERSION} from tag ${TAG}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if version already published on Hex
        id: check
        run: |
          PACKAGE="thrifty"
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Checking Hex for package ${PACKAGE} version ${VERSION}"
          # Use curl + jq to check if the version exists on Hex
          if curl -s "https://hex.pm/api/packages/${PACKAGE}" | jq -e ".releases[] | select(.version==\"${VERSION}\")" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update rebar.config version
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Updating rebar.config to version ${VERSION}"
          sed -i "s/{version, \".*\"}/{version, \"${VERSION}\"}/" rebar.config
          grep "{version" rebar.config || true

      - name: Debug HEX_API_KEY presence
        if: steps.check.outputs.exists == 'false'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          # Print masked presence info (length only) to help debugging secret exposure
          echo "HEX_API_KEY length: ${#HEX_API_KEY}"
          if [ -z "$HEX_API_KEY" ]; then
            echo "HEX_API_KEY is empty or not exposed to this run"
            exit 1
          fi

      - name: Authenticate Hex and publish
        if: steps.check.outputs.exists == 'false'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          echo "rebar3: $(rebar3 --version)"
          rebar3 hex --version || true
          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "HEX_API_KEY not set, skipping publish"
            exit 1
          fi
          echo "Attempting non-interactive auth with rebar3 hex user auth"
          # Try direct auth first
          if rebar3 hex user auth "$HEX_API_KEY"; then
            echo "Auth succeeded (direct)"
          else
            echo "Direct auth failed; trying via stdin"
            if echo "$HEX_API_KEY" | rebar3 hex user auth; then
              echo "Auth succeeded (stdin)"
            else
              echo "Auth failed with both methods"
              # Show whoami and plugin info for debugging
              rebar3 hex user whoami || true
              rebar3 plugins || true
              exit 1
            fi
          fi
          echo "Confirming identity with rebar3 hex user whoami"
          rebar3 hex user whoami
          echo "Publishing to Hex..."
          rebar3 hex publish

      - name: Skip publish message
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.ver.outputs.version }} already exists on Hex; skipping publish."

      - name: Upload package artifact (for audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hex-package
          path: _build/default/lib/thrifty/hex/thrifty-*.tar
